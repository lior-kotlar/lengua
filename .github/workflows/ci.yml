name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (lint · format · types · tests · coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .
      # pytest spins a throwaway Postgres via testcontainers (Docker is present on the runner).
      - run: uv run pytest

  web:
    name: web (lint · format · types · tests · coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm typecheck
      - run: pnpm test --coverage

  build:
    name: build (api image · web bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Build web bundle
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: lengua-api:ci
          outputs: type=docker,dest=/tmp/lengua-api.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: /tmp/lengua-api.tar
          if-no-files-found: error

  e2e:
    name: e2e (ephemeral stack · LLM stubbed)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # --- disposable Postgres on a user-defined network so the API container can reach it ---
      - name: Start disposable Postgres
        run: |
          docker network create lengua-e2e
          docker run -d --name pg --network lengua-e2e \
            -e POSTGRES_USER=lengua -e POSTGRES_PASSWORD=lengua -e POSTGRES_DB=lengua \
            -p 5432:5432 postgres:16-alpine

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Wait for Postgres and seed demo fixtures
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg://lengua:lengua@localhost:5432/lengua
        run: |
          uv sync --frozen
          for _ in $(seq 1 30); do
            if uv run python -c "import os, psycopg; psycopg.connect(os.environ['DATABASE_URL'].replace('+psycopg', '')).close()" 2>/dev/null; then
              break
            fi
            sleep 2
          done
          uv run python -c "import os; from sqlalchemy import create_engine; from tests.seed import seed_demo; print(seed_demo(create_engine(os.environ['DATABASE_URL'])))"

      # --- API container: LLM stubbed and NO provider keys => zero outbound LLM calls ---
      - uses: actions/download-artifact@v4
        with:
          name: api-image
          path: /tmp
      - name: Start API container
        run: |
          docker load -i /tmp/lengua-api.tar
          docker run -d --name api --network lengua-e2e -p 8000:8000 \
            -e LLM_PROVIDER=fake \
            -e DATABASE_URL=postgresql+psycopg://lengua:lengua@pg:5432/lengua \
            lengua-api:ci
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then break; fi
            sleep 2
          done
          curl -sf http://localhost:8000/health

      # --- web bundle + Playwright smoke against the built bundle ---
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Build web bundle
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: Install Playwright Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright smoke
        working-directory: apps/web
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  security:
    name: security (pip-audit · pnpm audit · gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - name: pip-audit (api dependencies)
        working-directory: apps/api
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file requirements.txt
          uvx pip-audit -r requirements.txt
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: pnpm audit (web dependencies)
        working-directory: apps/web
        run: pnpm audit --audit-level high
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
