<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lengua — Architecture</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c2330;
    --panel-3: #212a38;
    --border: #2b3340;
    --border-2: #3a4658;
    --text: #e6edf3;
    --muted: #9aa7b4;
    --muted-2: #6e7b8a;
    --accent: #6ea8fe;

    --c-client: #79c0ff;
    --c-backend: #7ee787;
    --c-llm: #d2a8ff;
    --c-data: #f0b860;
    --c-obs: #56d4dd;
    --c-cicd: #ff9f5a;
    --c-test: #ff8ec5;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1100px 620px at 88% -8%, #1b2a44 0%, rgba(27,42,68,0) 60%),
      radial-gradient(900px 600px at -5% 10%, #261c3a 0%, rgba(38,28,58,0) 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text); overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  code, .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }
  a { color: inherit; }

  /* ── shell ────────────────────────────────────────────────────── */
  .app { display: grid; grid-template-columns: 1fr 400px; height: 100vh; }
  .left { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

  /* ── shared topbar ────────────────────────────────────────────── */
  .topbar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 15px 26px 13px; border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: baseline; gap: 11px; }
  .brand .em { font-size: 23px; }
  .brand h1 { font-size: 21px; margin: 0; letter-spacing: -.01em; }
  .brand .sub { color: var(--muted); font-size: 13px; }
  .viewswitch { display: inline-flex; gap: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 999px; padding: 3px; margin-left: auto; }
  .viewswitch button { cursor: pointer; font: inherit; font-size: 12.5px; color: var(--muted); background: transparent; border: none;
                       padding: 6px 15px; border-radius: 999px; transition: all .14s; }
  .viewswitch button.on { color: #0e1116; background: var(--accent); font-weight: 600; }
  .viewswitch button:not(.on):hover { color: var(--text); }

  .views { position: relative; flex: 1; min-height: 0; }
  .view { position: absolute; inset: 0; }
  #view-map { overflow-y: auto; padding: 18px 30px 70px; display: none; }
  #view-map.active { display: block; }
  #view-graph { display: none; flex-direction: column; }
  #view-graph.active { display: flex; }
  #view-map::-webkit-scrollbar { width: 10px; }
  #view-map::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9px; }

  /* ── toolbar (shared by both views) ───────────────────────────── */
  .toolbar { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  #view-map .toolbar { margin: 4px 0 22px; }
  #view-graph .toolbar { padding: 12px 22px 4px; }
  .search { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; color: var(--text);
            padding: 8px 13px; font-size: 13.5px; width: 215px; outline: none; transition: border-color .15s, box-shadow .15s; }
  .search::placeholder { color: var(--muted-2); }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,168,254,.18); }
  .chips { display: flex; gap: 7px; flex-wrap: wrap; }
  .chip { cursor: pointer; user-select: none; font-size: 12px; color: var(--muted); background: var(--panel);
          border: 1px solid var(--border); padding: 6px 11px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; transition: all .14s; }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cat, var(--muted)); }
  .chip:hover { border-color: var(--border-2); color: var(--text); }
  .chip.active { color: var(--text); border-color: var(--cat, var(--accent)); background: color-mix(in srgb, var(--cat, var(--accent)) 15%, var(--panel)); }

  /* ── MAP VIEW: swimlanes + node cards ─────────────────────────── */
  .layer { position: relative; margin-bottom: 14px; }
  .layer-head { display: flex; align-items: center; gap: 10px; margin: 0 0 11px; }
  .layer-idx { width: 24px; height: 24px; border-radius: 7px; font-size: 12px; font-weight: 700; display: grid; place-items: center;
               color: #0e1116; background: var(--cat, var(--accent)); box-shadow: 0 0 14px -2px var(--cat, var(--accent)); }
  .layer-title { font-size: 14px; font-weight: 650; letter-spacing: .02em; }
  .layer-desc { font-size: 12.5px; color: var(--muted-2); }
  .nodes { display: flex; flex-wrap: wrap; gap: 11px; }
  .node { cursor: pointer; text-align: left; position: relative; background: linear-gradient(180deg, var(--panel-2), var(--panel));
          border: 1px solid var(--border); border-radius: 13px; padding: 13px 14px; width: 196px; color: var(--text); font: inherit;
          transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease, opacity .18s ease; }
  .node::before { content: ""; position: absolute; left: 0; top: 12px; bottom: 12px; width: 3px; border-radius: 3px; background: var(--cat, var(--accent)); }
  .node:hover { transform: translateY(-3px); border-color: var(--cat, var(--border-2)); box-shadow: 0 12px 28px -16px var(--cat, #000), 0 2px 0 rgba(255,255,255,.02) inset; }
  .node:focus-visible { outline: 2px solid var(--cat, var(--accent)); outline-offset: 2px; }
  .node .n-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .node .ic { font-size: 16px; line-height: 1; filter: saturate(1.1); }
  .node .n-title { font-size: 13.5px; font-weight: 640; letter-spacing: -.01em; }
  .node .n-tag { font-size: 11.8px; color: var(--muted); line-height: 1.4; }
  .node .n-badge { position: absolute; top: 10px; right: 11px; font-size: 9px; letter-spacing: .06em; text-transform: uppercase;
                   color: var(--muted-2); border: 1px solid var(--border); padding: 2px 6px; border-radius: 5px; }
  .node.planned { border-style: dashed; opacity: .82; }
  .node.dimmed { opacity: .22; filter: saturate(.5); }
  .node.selected { border-color: var(--cat, var(--accent)); box-shadow: 0 0 0 1px var(--cat, var(--accent)), 0 16px 34px -18px var(--cat, #000); transform: translateY(-3px); }
  .node.related { border-color: var(--cat, var(--border-2)); box-shadow: 0 0 0 1px color-mix(in srgb, var(--cat) 55%, transparent); }
  .layer-flow { text-align: center; color: var(--border-2); font-size: 15px; margin: 2px 0 12px; letter-spacing: 6px; }
  .credit { text-align: center; color: var(--muted-2); font-size: 11.5px; margin-top: 28px; }
  .credit code { color: var(--muted); }

  /* ── GRAPH VIEW: static svg network ───────────────────────────── */
  .canvas { flex: 1; min-height: 0; position: relative; }
  svg#graph { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .colhead { fill: var(--cat); font-size: 12px; font-weight: 700; letter-spacing: .04em; text-anchor: middle; text-transform: uppercase; opacity: .9; }
  .edge { fill: none; stroke: #46506173; stroke-width: 1.4; transition: stroke .15s, stroke-opacity .15s, stroke-width .15s; }
  .edge.hot { stroke-width: 2.4; }
  .edge.fade { stroke-opacity: .06; }
  .gnode { cursor: pointer; }
  .gnode .box { fill: #161d29; stroke: var(--cat); stroke-width: 1.6; transition: stroke-width .14s, fill .14s, filter .14s; }
  .gnode .ico { font-size: 16px; dominant-baseline: central; pointer-events: none; user-select: none; }
  .gnode .lbl { fill: var(--text); font-size: 12px; font-weight: 600; dominant-baseline: central; pointer-events: none; user-select: none; }
  .gnode.planned .box { stroke-dasharray: 4 3; }
  .gnode.planned .lbl { fill: var(--muted); }
  .gnode:hover .box, .gnode.sel .box { stroke-width: 2.6; fill: #1b2433; }
  .gnode.sel .box { filter: drop-shadow(0 0 7px color-mix(in srgb, var(--cat) 60%, transparent)); }
  .gnode.faded { opacity: .22; }
  .hint-fade { position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%); color: var(--muted-2); font-size: 11.5px;
               background: rgba(14,17,22,.7); border: 1px solid var(--border); padding: 5px 12px; border-radius: 999px; pointer-events: none; }

  /* ── shared detail panel ──────────────────────────────────────── */
  .aside { border-left: 1px solid var(--border); background: linear-gradient(180deg, rgba(28,35,48,.65), rgba(22,27,34,.92));
           display: flex; flex-direction: column; height: 100vh; }
  .aside-inner { padding: 22px 22px 26px; overflow-y: auto; flex: 1; }
  .aside-inner::-webkit-scrollbar { width: 9px; }
  .aside-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9px; }
  .d-empty { color: var(--muted); }
  .d-empty h3 { color: var(--text); font-size: 16px; margin: 0 0 8px; }
  .d-empty p { font-size: 13.5px; line-height: 1.55; margin: 0 0 12px; }
  .d-empty .hint { font-size: 12.5px; color: var(--muted-2); border-left: 2px solid var(--border-2); padding-left: 11px; }
  .d-empty .hint a { color: var(--accent); text-decoration: none; }
  .legend { margin-top: 18px; display: grid; gap: 7px; }
  .legend .lg { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--muted); }
  .legend .lg .dot { width: 9px; height: 9px; border-radius: 50%; }
  .detail { animation: fade .22s ease; position: relative; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .d-cat { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; font-weight: 600; color: var(--cat); }
  .d-cat .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cat); }
  .d-title { font-size: 21px; margin: 9px 0 3px; letter-spacing: -.01em; display: flex; align-items: center; gap: 9px; }
  .d-title .ic { font-size: 22px; }
  .d-sub { color: var(--muted); font-size: 13px; margin: 0 0 16px; }
  .d-section { margin: 16px 0; }
  .d-label { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted-2); margin: 0 0 8px; font-weight: 600; }
  .d-charge { font-size: 14px; line-height: 1.62; color: var(--text); margin: 0; }
  .d-charge strong { color: var(--cat); font-weight: 600; }
  .tagrow { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11.5px; color: var(--text); background: var(--panel-3); border: 1px solid var(--border); padding: 3px 9px; border-radius: 7px; }
  .files { display: grid; gap: 5px; }
  .file { font-size: 11.8px; color: var(--muted); background: rgba(255,255,255,.025); border: 1px solid var(--border); border-radius: 7px; padding: 6px 9px; word-break: break-all; }
  .file b { color: var(--text); font-weight: 600; }
  .conns { display: flex; flex-wrap: wrap; gap: 6px; }
  .conn { cursor: pointer; font: inherit; font-size: 11.8px; color: var(--muted); background: var(--panel); border: 1px solid var(--border);
          border-radius: 999px; padding: 4px 11px 4px 8px; display: inline-flex; align-items: center; gap: 6px; transition: all .14s; }
  .conn .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cc, var(--muted)); }
  .conn:hover { color: var(--text); border-color: var(--cc, var(--border-2)); transform: translateY(-1px); }
  .d-close { position: absolute; top: -2px; right: 0; cursor: pointer; background: var(--panel); border: 1px solid var(--border);
             color: var(--muted); width: 30px; height: 30px; border-radius: 8px; font-size: 15px; line-height: 1; transition: all .14s; }
  .d-close:hover { color: var(--text); border-color: var(--border-2); }

  /* ── responsive ───────────────────────────────────────────────── */
  @media (max-width: 940px) {
    .app { grid-template-columns: 1fr; }
    .aside { position: fixed; inset: auto 0 0 0; height: 70vh; z-index: 40; border-left: none; border-top: 1px solid var(--border-2);
             border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform .3s cubic-bezier(.2,.7,.2,1); box-shadow: 0 -20px 50px -20px #000; }
    .aside.open { transform: translateY(0); }
    .node { width: calc(50% - 6px); }
  }
  @media (max-width: 520px) { #view-map { padding: 16px 16px 60px; } .node { width: 100%; } }
</style>
</head>
<body>
<div class="app">
  <div class="left">
    <header class="topbar">
      <div class="brand">
        <span class="em">🗣️</span>
        <h1>Lengua — Architecture</h1>
        <span class="sub" id="view-sub">how the whole system fits together</span>
      </div>
      <nav class="viewswitch">
        <button id="tab-map" class="on">◫ Layered map</button>
        <button id="tab-graph">🕸 Software map</button>
      </nav>
    </header>

    <div class="views">
      <!-- ════════════ LAYERED MAP ════════════ -->
      <section id="view-map" class="view active">
        <div class="toolbar">
          <input id="map-search" class="search" type="text" placeholder="Search components…" autocomplete="off" />
          <div class="chips" id="map-chips"></div>
        </div>
        <div id="map-layers"></div>
        <div class="credit">
          One self-contained file · two views. Generated from <code>README.md</code>, <code>.github/workflows/</code> and the repo.
        </div>
      </section>

      <!-- ════════════ SOFTWARE MAP ════════════ -->
      <section id="view-graph" class="view">
        <div class="toolbar">
          <input id="graph-search" class="search" type="text" placeholder="Find a tool… (Enter)" autocomplete="off" />
          <div class="chips" id="graph-chips"></div>
        </div>
        <div class="canvas">
          <svg id="graph" preserveAspectRatio="xMidYMid meet">
            <g id="graph-heads"></g>
            <g id="graph-edges"></g>
            <g id="graph-nodes"></g>
          </svg>
          <div class="hint-fade">Hover a tool to trace its links · click for what it is &amp; why it's here</div>
        </div>
      </section>
    </div>
  </div>

  <aside class="aside" id="aside">
    <div class="aside-inner" id="detail"></div>
  </aside>
</div>

<script>
const detailEl = document.getElementById("detail");
const asideEl  = document.getElementById("aside");

/* ═══════════════════════════════════════════════════════════════════
   VIEW 1 — LAYERED MAP  (modules, routes, the full architecture)
   ═══════════════════════════════════════════════════════════════════ */
const MapView = (function () {
  const CATS = {
    client:   { label: "Client / Frontend", color: "var(--c-client)" },
    backend:  { label: "Backend / API",     color: "var(--c-backend)" },
    llm:      { label: "LLM Providers",     color: "var(--c-llm)" },
    data:     { label: "Data / Auth",       color: "var(--c-data)" },
    obs:      { label: "Observability",     color: "var(--c-obs)" },
    cicd:     { label: "CI / CD & Hosting", color: "var(--c-cicd)" },
  };
  const LAYERS = [
    { id:"clients", cat:"client",  idx:1, title:"Clients",            desc:"what the user touches" },
    { id:"api",     cat:"backend", idx:2, title:"Backend · apps/api", desc:"FastAPI service + pure domain core" },
    { id:"llm",     cat:"llm",     idx:3, title:"LLM Providers",      desc:"swappable behind one seam" },
    { id:"data",    cat:"data",    idx:4, title:"Data & Auth",        desc:"Supabase Postgres, RLS, migrations" },
    { id:"obs",     cat:"obs",     idx:5, title:"Observability",      desc:"traces, metrics, logs, errors, analytics" },
    { id:"cicd",    cat:"cicd",    idx:6, title:"CI / CD & Hosting",  desc:"GitHub Actions → Cloud Run + Vercel" },
  ];
  const NODES = [
    /* 1 · CLIENTS */
    { id:"web", layer:"clients", cat:"client", title:"React Web App", icon:"💻", tag:"apps/web — the primary UI",
      charge:"The user-facing single-page app. Owns every screen — <strong>Generate, Review, Discover, Settings, Account</strong>, auth (signup / login / reset / OAuth), language + CEFR management — plus RTL/diacritics rendering, shared loading/empty/error states, and the consent-gated analytics banner. Calls the backend <strong>exclusively</strong> through the typed API client; uses Supabase for auth only.",
      tech:["React 18","TypeScript","Vite","Tailwind","shadcn/ui","TanStack Query","pnpm"],
      files:["<b>apps/web/</b> — app shell, pages, components","apps/web/src/lib/api-client.ts — authed singleton","apps/web/src/lib/supabase — auth client"],
      links:["api-types","supabase-auth","fastapi","posthog","sentry","vercel"] },
    { id:"api-types", layer:"clients", cat:"client", title:"Typed API Client", icon:"🔌", tag:"packages/api-types",
      charge:"The single contract between web and API. <strong>OpenAPI-generated TS types + an openapi-fetch client</strong> (createApiClient) plus <code>schemaLimits</code> runtime constants the types can't carry (e.g. the word cap). Two CI drift checks keep it locked to <code>apps/api/openapi.json</code>, so a backend route change that isn't regenerated fails the PR.",
      tech:["openapi-fetch","OpenAPI","TypeScript","codegen"],
      files:["<b>packages/api-types/</b>","packages/api-types/src/schema.ts (generated)","packages/api-types/src/constants.ts — schemaLimits"],
      links:["web","fastapi","lint"] },
    { id:"mobile", layer:"clients", cat:"client", title:"Mobile (Capacitor)", icon:"📱", planned:true, tag:"planned — Phase 7",
      charge:"A future Capacitor wrapper of the React app for the App Store / Play Store. Already accounted for in the auth redirect allow-list (<code>capacitor://localhost</code>) and the <code>app.lengua://</code> deep-link scheme, but not built yet.",
      tech:["Capacitor","iOS","Android"], files:["(Phase 7 — not yet in repo)"], links:["web","supabase-auth"] },
    { id:"legacy", layer:"clients", cat:"client", title:"Legacy Streamlit", icon:"🧪", planned:true, tag:"apps/api/legacy_streamlit — deprecated",
      charge:"The original single-user Streamlit app and its local SQLite store. Now at <strong>full feature parity</strong> with the React app, so it is deprecated — but kept runnable as a reference implementation and fallback until the React app ships to production.",
      tech:["Streamlit","SQLite","Python"],
      files:["<b>apps/api/legacy_streamlit/</b>","apps/api/legacy_streamlit/pages/ — Generate/Review/Discover/Settings","apps/api/data/lengua.db (git-ignored)"],
      links:["core","scheduler"] },

    /* 2 · BACKEND */
    { id:"fastapi", layer:"api", cat:"backend", title:"FastAPI Service", icon:"⚡", tag:"app.main — the HTTP surface",
      charge:"The web service that serves the whole <strong>Generate → Save → Review → Discover</strong> loop over HTTP. Fronts everything with a strict <strong>CORS allow-list</strong> and exposes only <code>GET /health</code> (liveness) and <code>GET /ready</code> (DB readiness) unauthenticated; every other route requires a verified token.",
      tech:["FastAPI","Uvicorn","Python 3.12","uv","Pydantic"],
      files:["<b>apps/api/app/main.py</b> — create_app()","apps/api/app/deps.py — get_db / current_user","apps/api/Dockerfile — multi-stage uv image"],
      links:["routers","auth-dep","cost-guard","core","rls-session","cloud-run","api-types"] },
    { id:"routers", layer:"api", cat:"backend", title:"API Endpoints", icon:"🛣️", tag:"the full-loop routes",
      charge:"All HTTP endpoints: <code>/generate</code>, <code>/cards/save</code>, <code>/review/due</code>, <code>/review/{id}/grade</code>, <code>/discover</code> (+ <code>/accept</code>), <code>/explain</code>, <code>/languages</code>, <code>/proficiency</code>, <code>/settings</code>, <code>/me</code>, <code>/account/export</code> + <code>DELETE /account</code>, and the public <code>/feature-flags</code> map. Each is scoped to the authenticated user.",
      tech:["FastAPI routers","REST","JWT-scoped"],
      files:["apps/api/app/routers/ — one module per surface","apps/api/openapi.json — the checked-in contract"],
      links:["fastapi","auth-dep","cost-guard","cards","scheduler","proficiency","feature-flags"] },
    { id:"auth-dep", layer:"api", cat:"backend", title:"JWT Verification", icon:"🔑", tag:"current_user dependency",
      charge:"Verifies a <strong>Supabase access token (JWT) on every request</strong> — checks signature, <code>exp</code> and <code>aud</code>, derives the user id from <code>sub</code>. <strong>HS256</strong> against <code>SUPABASE_JWT_SECRET</code> by default, or <strong>RS256/ES256</strong> via a configured <code>SUPABASE_JWKS_URL</code>. A missing/invalid token gets <code>401</code>.",
      tech:["JWT","HS256 / RS256 / ES256","JWKS"],
      files:["apps/api/app/auth.py — current_user dependency","(verifies tokens minted by Supabase Auth)"],
      links:["supabase-auth","fastapi","rls-session"] },
    { id:"cost-guard", layer:"api", cat:"backend", title:"LLM Cost Guard", icon:"🛡️", tag:"the zero-bill backstop",
      charge:"A gate chain run before <em>every</em> LLM call, in order <strong>email-verified → rate-limit → daily-cap → global-budget</strong>; the earliest failure is returned. Adds a <strong>per-user rate limit</strong> (429 + Retry-After), <strong>per-kind daily caps</strong> + new-account day-0 guard, a <strong>request-size cap</strong> (422), <strong>Discover reuse cache</strong>, a process-wide <strong>concurrency cap</strong> (503 server_busy), transient-error backoff, and the <strong>global daily kill-switch</strong> that guarantees the shared key can never produce a bill. Caps count only successful calls; cached responses are free.",
      tech:["rate limiting","quota caps","kill-switch","concurrency cap","backoff"],
      files:["apps/api/app/quota.py — the 5-gate chain","apps/api/app/llm_runner.py — concurrency limiter","emits llm.call + quota.check spans (see Observability)"],
      links:["llm-seam","routers","otel","feature-flags"] },
    { id:"feature-flags", layer:"api", cat:"backend", title:"Feature Flags", icon:"🚩", tag:"ship dark, no redeploy",
      charge:"Risky/new features hide behind a flag that defaults <strong>off</strong>, resolved from an env default (<code>FEATURE_*</code>) overlaid by a row in a <strong>global feature_flags table</strong>, cached in-process for a short TTL. Flip the row → flag changes for everyone within one TTL with <strong>no redeploy</strong>. Only the resolved PUBLIC map reaches the browser; users can never enable their own flags.",
      tech:["env + DB overlay","TTL cache","kill-switch RLS"],
      files:["apps/api/app/feature_flags.py","feature_flags table (server-only, deny-by-default RLS)"],
      links:["routers","web","supabase-db"] },

        <p class="d-sub">${n.tag}</p>
        <div class="d-section"><p class="d-label">Responsible for</p><p class="d-charge">${n.charge}</p></div>
        ${tech ? `<div class="d-section"><p class="d-label">Key tech</p><div class="tagrow">${tech}</div></div>` : ""}
        ${files ? `<div class="d-section"><p class="d-label">Files / paths</p><div class="files">${files}</div></div>` : ""}
        ${conns ? `<div class="d-section"><p class="d-label">Connects to</p><div class="conns">${conns}</div></div>` : ""}
      </div>`;
    detailEl.querySelector(".d-close").onclick = renderEmpty;
    detailEl.querySelectorAll(".conn").forEach(b => b.onclick = () => select(b.dataset.go));
    asideEl.classList.add("open");
    if (window.innerWidth <= 940) asideEl.scrollIntoView({ behavior: "smooth" });
  }
  function applyFilter() {
    const q = (searchEl.value || "").trim().toLowerCase();
    LAYERS.forEach(layer => {
      const sec = layersEl.querySelector(`[data-layer="${layer.id}"]`);
      let any = false;
      sec.querySelectorAll(".node").forEach(card => {
        const n = byId[card.dataset.id];
        const ok = (activeCats.size === 0 || activeCats.has(n.cat)) &&
          (!q || (n.title+" "+n.tag+" "+n.charge+" "+(n.tech||[]).join(" ")).toLowerCase().includes(q));
        card.style.display = ok ? "" : "none"; if (ok) any = true;
      });
      sec.style.display = any ? "" : "none";
      const f = sec.nextElementSibling;
      if (f && f.classList.contains("layer-flow")) f.style.display = any ? "" : "none";
    });
  }
  searchEl.addEventListener("input", applyFilter);
  return { renderEmpty };
})();

  const VB_W = 1380, VB_H = 780;
  const SVGNS = "http://www.w3.org/2000/svg";
  const byId = Object.fromEntries(NODES.map(n => [n.id, n]));
  const svg = document.getElementById("graph");
  svg.setAttribute("viewBox", `0 0 ${VB_W} ${VB_H}`);
  const rootStyle = getComputedStyle(document.documentElement);
  const resolve = v => { const m = /var\((--[\w-]+)\)/.exec(v); return m ? rootStyle.getPropertyValue(m[1]).trim() : v; };
  const CAT_COLOR = Object.fromEntries(Object.entries(CATS).map(([k,c]) => [k, resolve(c.color)]));

  const NW = 150, NH = 46, marginX = 52, topY = 92, botY = 56;
  const colW = (VB_W - marginX*2) / COL_ORDER.length;
  const pos = {};
  COL_ORDER.forEach((cat, ci) => {
    const cx = marginX + colW * (ci + 0.5);
    const members = NODES.filter(n => n.cat === cat);
    const step = (VB_H - topY - botY) / members.length;
    members.forEach((n, i) => { pos[n.id] = { x: cx, y: topY + step * (i + 0.5) }; });
  });

  const headsG = document.getElementById("graph-heads");
  COL_ORDER.forEach((cat, ci) => {
    const t = document.createElementNS(SVGNS, "text");
    t.setAttribute("class", "colhead"); t.setAttribute("x", marginX + colW * (ci + 0.5)); t.setAttribute("y", 50);
    t.style.setProperty("--cat", CAT_COLOR[cat]); t.textContent = CATS[cat].label;
    headsG.appendChild(t);
  });

  const edgeSet = new Set(); const EDGES = [];
  NODES.forEach(n => (n.links||[]).forEach(t => {
    if (!byId[t]) return; const key = [n.id, t].sort().join("|");
    if (edgeSet.has(key)) return; edgeSet.add(key); EDGES.push({ a: n.id, b: t });
  }));
  const edgesG = document.getElementById("graph-edges");
  const edgeEls = EDGES.map(e => {
    const p = pos[e.a], q = pos[e.b], mx = (p.x + q.x) / 2;
    const path = document.createElementNS(SVGNS, "path");
    path.setAttribute("d", `M ${p.x} ${p.y} C ${mx} ${p.y}, ${mx} ${q.y}, ${q.x} ${q.y}`);
    path.setAttribute("class", "edge"); path.dataset.a = e.a; path.dataset.b = e.b;
    edgesG.appendChild(path); return path;
  });

  const nodesG = document.getElementById("graph-nodes");
  const nodeEls = {};
  NODES.forEach(n => {
    const p = pos[n.id], col = CAT_COLOR[n.cat];
    const g = document.createElementNS(SVGNS, "g");
    g.setAttribute("class", "gnode" + (n.planned ? " planned" : ""));
    g.setAttribute("transform", `translate(${p.x},${p.y})`);
    g.style.setProperty("--cat", col); g.dataset.id = n.id;
    const box = document.createElementNS(SVGNS, "rect");
    box.setAttribute("class", "box"); box.setAttribute("x", -NW/2); box.setAttribute("y", -NH/2);
    box.setAttribute("width", NW); box.setAttribute("height", NH); box.setAttribute("rx", 12);
    const ico = document.createElementNS(SVGNS, "text");
    ico.setAttribute("class", "ico"); ico.setAttribute("x", -NW/2 + 15); ico.setAttribute("y", 1); ico.textContent = n.icon;
    const lbl = document.createElementNS(SVGNS, "text");
    lbl.setAttribute("class", "lbl"); lbl.setAttribute("x", -NW/2 + 40); lbl.setAttribute("y", 1); lbl.textContent = n.title;
    g.append(box, ico, lbl);
    g.addEventListener("pointerenter", () => { if (selectedId == null) highlight(n.id, false); });
    g.addEventListener("pointerleave", () => { if (selectedId == null) clearHi(); else highlight(selectedId, true); });
    g.addEventListener("click", e => { e.stopPropagation(); select(n.id); });
    nodesG.appendChild(g); nodeEls[n.id] = g;
  });

  function neighbors(id) { const s = new Set([id]); EDGES.forEach(e => { if (e.a===id) s.add(e.b); if (e.b===id) s.add(e.a); }); return s; }
  function highlight(id, isSel) {
    const nb = neighbors(id);
    for (const nid in nodeEls) {
      if (!visible(byId[nid].cat)) continue;
      const g = nodeEls[nid];
      g.classList.toggle("faded", !nb.has(nid));
      g.classList.toggle("sel", isSel && nid === id);
    }
    edgeEls.forEach(p => { const inc = p.dataset.a===id || p.dataset.b===id; p.classList.toggle("hot", inc); p.classList.toggle("fade", !inc); });
  }
  function clearHi() { for (const nid in nodeEls) nodeEls[nid].classList.remove("faded","sel"); edgeEls.forEach(p => p.classList.remove("hot","fade")); }

  let activeCats = new Set();
  const visible = cat => activeCats.size === 0 || activeCats.has(cat);
  const chipsEl = document.getElementById("graph-chips");
  Object.entries(CATS).forEach(([key, c]) => {
    const b = document.createElement("button");
    b.className = "chip"; b.style.setProperty("--cat", c.color);
    b.innerHTML = `<span class="dot"></span>${c.label}`;
    b.onclick = () => { activeCats.has(key) ? activeCats.delete(key) : activeCats.add(key); b.classList.toggle("active"); applyFilter(); };
    chipsEl.appendChild(b);
  });
  function applyFilter() {
    for (const nid in nodeEls) nodeEls[nid].style.display = visible(byId[nid].cat) ? "" : "none";
    edgeEls.forEach(p => { p.style.display = (visible(byId[p.dataset.a].cat) && visible(byId[p.dataset.b].cat)) ? "" : "none"; });
    headsG.querySelectorAll("text").forEach((t, i) => t.style.opacity = visible(COL_ORDER[i]) ? "" : ".25");
  }

  let selectedId = null;
  function renderEmpty() {
    selectedId = null; clearHi();
    const legend = Object.entries(CATS).map(([k,c]) => `<div class="lg"><span class="dot" style="background:${c.color}"></span>${c.label}</div>`).join("");
    detailEl.innerHTML = `
      <div class="d-empty">
        <h3>The software behind Lengua</h3>
        <p>Every box is a real tool or service we use; every line is a real dependency between them — grouped into the columns of the stack: frontend, backend, data, LLM, observability, hosting and testing.</p>
        <p><b>Hover</b> a tool to trace what it connects to. <b>Click</b> it to read what it is and <em>why we added it</em>, at an architecture level. Use the chips to focus one part of the stack.</p>
        <div class="hint">Want the internals — modules, routes, the cost-guard gate chain? Switch to the <a href="#" onclick="showView('map');return false;">Layered map</a> tab.</div>
        <div class="legend">${legend}</div>
      </div>`;
  }
  function select(id) {
    const n = byId[id]; if (!n) return;
    selectedId = id; highlight(id, true);
    const tech = (n.tech||[]).map(t => `<span class="tag">${t}</span>`).join("");
    const conns = (n.links||[]).map(lid => { const t = byId[lid]; if (!t) return ""; return `<button class="conn" data-go="${lid}" style="--cc:${CAT_COLOR[t.cat]}"><span class="dot"></span>${t.title}</button>`; }).join("");
    detailEl.innerHTML = `
      <div class="detail" style="--cat:${CATS[n.cat].color}">
        <button class="d-close" title="Close">✕</button>
        <span class="d-cat"><span class="dot"></span>${CATS[n.cat].label}${n.planned ? " · planned" : ""}</span>
        <h2 class="d-title"><span class="ic">${n.icon}</span>${n.full || n.title}</h2>
        <p class="d-sub">${n.tag}</p>
        <div class="d-section"><p class="d-label">What it is &amp; why it's here</p><p class="d-charge">${n.why}</p></div>
        ${tech ? `<div class="d-section"><p class="d-label">Tech</p><div class="tagrow">${tech}</div></div>` : ""}
        ${conns ? `<div class="d-section"><p class="d-label">Connects to</p><div class="conns">${conns}</div></div>` : ""}
      </div>`;
    detailEl.querySelector(".d-close").onclick = renderEmpty;
    detailEl.querySelectorAll(".conn").forEach(b => b.onclick = () => select(b.dataset.go));
    asideEl.classList.add("open");
    if (window.innerWidth <= 940) asideEl.scrollIntoView({ behavior: "smooth" });
  }
  const searchEl = document.getElementById("graph-search");
  searchEl.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const q = searchEl.value.trim().toLowerCase(); if (!q) return;
    const hit = NODES.find(n => (n.title+" "+(n.full||"")+" "+n.tag+" "+(n.tech||[]).join(" ")).toLowerCase().includes(q));
    if (hit) select(hit.id);
  });
  svg.addEventListener("click", (e) => {
    // only clear when the click is on empty canvas, never when it lands on/near a node
    if (!(e.target instanceof Element) || !e.target.closest(".gnode")) renderEmpty();
  });
  return { renderEmpty };
})();

/* ═══════════════════════════════════════════════════════════════════
   TABS
   ═══════════════════════════════════════════════════════════════════ */
let current = "map";
function showView(which) {
  current = which;
  document.getElementById("view-map").classList.toggle("active", which === "map");
  document.getElementById("view-graph").classList.toggle("active", which === "graph");
  document.getElementById("tab-map").classList.toggle("on", which === "map");
  document.getElementById("tab-graph").classList.toggle("on", which === "graph");
  document.getElementById("view-sub").textContent =
    which === "map" ? "every layer, module and route" : "the real tools, and why we use them";
  asideEl.classList.remove("open");
  (which === "map" ? MapView : GraphView).renderEmpty();
}
document.getElementById("tab-map").onclick   = () => showView("map");
document.getElementById("tab-graph").onclick = () => showView("graph");
document.addEventListener("keydown", e => { if (e.key === "Escape") { (current === "map" ? MapView : GraphView).renderEmpty(); asideEl.classList.remove("open"); } });

showView("map");
</script>
