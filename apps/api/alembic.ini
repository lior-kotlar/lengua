# Alembic configuration for the Lengua API (task 1.4.1).
#
# The database URL is NOT set here — `migrations/env.py` resolves it at runtime from
# `app.settings` (the `DATABASE_URL` env var), so the same migrations run against local
# Supabase, CI, and prod without editing this file. Override per-invocation with
# `alembic -x db_url=postgresql://… upgrade head` (used by the round-trip tests).

[alembic]
# Path to the migration environment (env.py + versions/), relative to this file.
script_location = migrations

# Make `app` / `lengua_core` importable when alembic runs from `apps/api`.
prepend_sys_path = .

# New migration filenames: zero-padded date + revision + slug, e.g.
# 20260625_ab12cd34_add_streaks.py — chronologically sortable.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Treat the stored timestamps as timezone-aware UTC.
timezone = UTC

# sqlalchemy.url is intentionally omitted — see env.py (resolved from app.settings / env).

# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
